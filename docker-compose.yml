version: '3.8'

services:
  postgres_db:
    image: postgres:16-alpine 
    container_name: babylonian_db
    restart: no 
    
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    
    ports:
      - "${DB_PORT}:5432"
    
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: